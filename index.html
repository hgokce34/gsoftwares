<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gSoftwares.dev — Yazılım & Dijital Çözümler</title>
  <meta name="description" content="Hamza Gökçe & Taner Aydoğan — Web geliştirme, tasarım, sosyal medya ve yazılım çözümleri.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      /* PREMIUM DARK DESIGN SYSTEM - gSoftwares.dev v2.0 */
      --bg:    #0B0F19;
      --bg2:   #0F1422;
      --bg3:   #141929;
      --bg4:   #1A2035;
      --bg5:   #1E2640;
      --border:   rgba(255,255,255,0.055);
      --border2:  rgba(255,255,255,0.10);
      --border3:  rgba(99,102,241,0.25);
      --text:   #F0F2FA;
      --text2:  #8892A4;
      --text3:  #4A5568;
      --text4:  #2D3748;
      --accent:   #6366F1;
      --accent2:  #818CF8;
      --accent3:  #4F46E5;
      --green:   #10B981;
      --green2:  #34D399;
      --blue:    #3B82F6;
      --purple:  #8B5CF6;
      --gold:    #F59E0B;
      --cyan:    #06B6D4;
      --red:     #EF4444;
      --grad1: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
      --grad2: linear-gradient(135deg, #10B981 0%, #3B82F6 100%);
      --grad3: linear-gradient(135deg, #6366F1 0%, #06B6D4 50%, #10B981 100%);
      --grad-text: linear-gradient(135deg, #F0F2FA 0%, #8892A4 100%);
      --font:         'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-display: 'Space Grotesk', 'Inter', sans-serif;
      --font-mono:    'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      --text-xs:   11px;
      --text-sm:   13px;
      --text-base: 15px;
      --text-md:   17px;
      --text-lg:   20px;
      --text-xl:   24px;
      --text-2xl:  30px;
      --text-3xl:  38px;
      --text-4xl:  48px;
      --text-5xl:  64px;
      --text-6xl:  80px;
      --fw-light:    300;
      --fw-regular:  400;
      --fw-medium:   500;
      --fw-semibold: 600;
      --fw-bold:     700;
      --fw-extrabold: 800;
      --fw-black:    900;
      --lh-tight:   1.08;
      --lh-snug:    1.25;
      --lh-normal:  1.5;
      --lh-relaxed: 1.75;
      --lh-loose:   2;
      --ls-tight:  -0.04em;
      --ls-snug:   -0.02em;
      --ls-normal:  0;
      --ls-wide:    0.05em;
      --ls-wider:   0.10em;
      --ls-widest:  0.20em;
      --sp-1:  4px;
      --sp-2:  8px;
      --sp-3:  12px;
      --sp-4:  16px;
      --sp-5:  20px;
      --sp-6:  24px;
      --sp-8:  32px;
      --sp-10: 40px;
      --sp-12: 48px;
      --sp-16: 64px;
      --sp-20: 80px;
      --sp-24: 96px;
      --sp-32: 128px;
      --radius-xs:  6px;
      --radius-sm:  10px;
      --radius:     16px;
      --radius-lg:  20px;
      --radius-xl:  28px;
      --radius-2xl: 36px;
      --radius-full: 9999px;
      --shadow-xs:  0 1px 2px rgba(0,0,0,0.3);
      --shadow-sm:  0 2px 8px rgba(0,0,0,0.35);
      --shadow-md:  0 4px 20px rgba(0,0,0,0.4);
      --shadow-lg:  0 8px 40px rgba(0,0,0,0.45);
      --shadow-xl:  0 20px 60px rgba(0,0,0,0.5);
      --shadow-2xl: 0 32px 80px rgba(0,0,0,0.55);
      --glow-accent:  0 0 30px rgba(99,102,241,0.20);
      --glow-green:   0 0 30px rgba(16,185,129,0.18);
      --glow-blue:    0 0 30px rgba(59,130,246,0.18);
      --glow-card:    0 0 0 1px rgba(255,255,255,0.055), 0 8px 32px rgba(0,0,0,0.4);
      --ease-out:     cubic-bezier(0.16, 1, 0.3, 1);
      --ease-in-out:  cubic-bezier(0.4, 0, 0.2, 1);
      --ease-spring:  cubic-bezier(0.34, 1.56, 0.64, 1);
      --duration-fast:   150ms;
      --duration-base:   200ms;
      --duration-slow:   350ms;
      --duration-slower: 500ms;
      --z-base:    0;
      --z-raised:  10;
      --z-sticky:  100;
      --z-overlay: 500;
      --z-modal:   1000;
      --z-toast:   2000;
      --blur-sm: blur(8px);
      --blur-md: blur(16px);
      --blur-lg: blur(24px);
      --blur-xl: blur(40px);
      --glow: 0 0 40px rgba(99,102,241,0.12);
    }
    [data-theme="light"] {
      --bg: #f0f4ff;
      --bg2: #ffffff;
      --bg3: #e8eeff;
      --bg4: #dde5ff;
      --border: rgba(0,0,0,0.07);
      --border2: rgba(0,0,0,0.13);
      --text: #0f172a;
      --text2: #475569;
      --text3: #94a3b8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); overflow-x: hidden; transition: background .3s, color .3s; }

    /* NAVBAR */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      padding: 0 40px; height: 68px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(5,8,16,0.8);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
    }
    [data-theme="light"] nav { background: rgba(240,244,255,0.85); }

    /* LOGO */
    .nav-logo {
      display: flex; align-items: center; gap: 12px;
      text-decoration: none; color: var(--text);
    }
    .logo-mark { position: relative; width: 42px; height: 42px; }
    .logo-mark svg { width: 42px; height: 42px; }
    .logo-text { display: flex; flex-direction: column; }
    .logo-name {
      font-family: var(--font-display);
      font-size: 18px; font-weight: 800;
      letter-spacing: -0.5px; line-height: 1;
    }
    .logo-name .g { color: var(--accent2); }
    .logo-name .s { color: var(--blue); }
    .logo-domain {
      font-family: var(--font-mono);
      font-size: 9px; color: var(--text3);
      letter-spacing: .1em; margin-top: 2px;
    }

    .nav-links { display: flex; align-items: center; gap: 4px; list-style: none; }
    .nav-links a {
      text-decoration: none; color: var(--text2);
      font-size: 13px; font-weight: 500;
      padding: 7px 16px; border-radius: 10px;
      transition: all .2s;
    }
    .nav-links a:hover { color: var(--text); background: var(--bg3); }

    .nav-actions { display: flex; align-items: center; gap: 10px; }
    .lang-btn, .theme-btn {
      background: var(--bg3); border: 1px solid var(--border2);
      border-radius: 10px; cursor: pointer;
      font-family: var(--font-mono); font-size: 11px; font-weight: 700;
      color: var(--text2); padding: 7px 12px; transition: all .2s;
    }
    .theme-btn { width: 38px; height: 38px; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .lang-btn:hover, .theme-btn:hover { color: var(--text); border-color: var(--accent2); }
    .nav-cta {
      background: var(--grad1); border: none; color: #000;
      font-size: 13px; font-weight: 800; padding: 9px 20px;
      border-radius: 10px; cursor: pointer; transition: opacity .2s, transform .2s;
      text-decoration: none; letter-spacing: -.2px;
    }
    .nav-cta:hover { opacity: .85; transform: translateY(-1px); }

    /* HERO */
    .hero {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden; padding: 100px 40px 80px;
    }
    .hero-content { position: relative; z-index: 2; max-width: 900px; text-align: center; }
    
    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(44px, 8vw, 88px);
      font-weight: 800; line-height: 1.02;
      letter-spacing: -3px; margin-bottom: 28px;
    }
    .hero-title .grad-text {
      background: var(--grad3);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: 18px; color: var(--text2); line-height: 1.75;
      max-width: 600px; margin: 0 auto 44px;
    }

    .hero-btns { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
    .btn-primary {
      background: var(--grad1); color: #000; border: none;
      padding: 15px 32px; border-radius: var(--radius-sm);
      font-weight: 800; font-size: 14px; cursor: pointer;
      transition: all .2s; text-decoration: none;
      display: inline-flex; align-items: center; gap: 8px;
      box-shadow: 0 8px 32px rgba(0,229,160,0.25);
      letter-spacing: -.2px;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,229,160,0.35); }
    
    .btn-secondary {
      background: var(--bg3); color: var(--text); border: 1px solid var(--border2);
      padding: 15px 32px; border-radius: var(--radius-sm);
      font-weight: 600; font-size: 14px; cursor: pointer;
      transition: all .2s; text-decoration: none;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-secondary:hover { border-color: var(--accent2); color: var(--accent2); transform: translateY(-2px); }

    /* SECTIONS */
    section { padding: 110px 40px; position: relative; z-index: 2; }
    .container { max-width: 1140px; margin: 0 auto; }
    
    /* FOOTER */
    footer { padding: 40px; border-top: 1px solid var(--border); position: relative; z-index: 2; }
    .footer-inner { max-width: 1140px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
    .footer-copy { font-size: 12px; color: var(--text3); margin-top: 4px; }
    .footer-links { display: flex; gap: 0; flex-wrap: wrap; align-items: center; }
    .footer-links a {
      font-size: 13px; color: var(--text3); text-decoration: none;
      transition: color .2s; padding: 4px 14px;
      border-right: 1px solid var(--border);
    }
    .footer-links a:last-child { border-right: none; }
    .footer-links a:hover { color: var(--accent2); }

    /* MOBILE NAV */
    @media(max-width:768px) {
      nav { padding: 0 20px; }
      .nav-links { display: none; }
      section { padding: 80px 20px; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-logo">
      <div class="logo-text">
        <div class="logo-name"><span class="g">g</span><span class="s">S</span></div>
        <div class="logo-domain">SOFTWARES</div>
      </div>
    </a>
    <ul class="nav-links">
      <li><a href="#hakkimizda">Hakkımızda</a></li>
      <li><a href="#projeler">Projeler</a></li>
      <li><a href="#iletisim">İletişim</a></li>
    </ul>
    <div class="nav-actions">
      <button class="lang-btn">EN</button>
      <button class="theme-btn">🌙</button>
      <a href="#iletisim" class="nav-cta">Bize Ulaşın</a>
    </div>
  </nav>

  <section class="hero">
    <div class="hero-content">
      <h1 class="hero-title">
        <span class="grad-text">Dijital Çözümler</span>
      </h1>
      <p class="hero-sub">Modern tasarım ve güçlü kod ile işinizi ileriye taşıyoruz.</p>
      <div class="hero-btns">
        <button class="btn-primary">Proje Başlat</button>
        <button class="btn-secondary">Daha Fazla Bilgi</button>
      </div>
    </div>
  </section>

  <footer>
    <div class="footer-inner">
      <p class="footer-copy">© 2024 gSoftwares.dev. All rights reserved.</p>
      <div class="footer-links">
        <a href="#about">About</a>
        <a href="#services">Services</a>
        <a href="#contact">Contact</a>
      </div>
    </div>
  </footer>
</body>
</html>
